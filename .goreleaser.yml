version: 2

project_name: timer-doctor

before:
  hooks:
    - go mod tidy

builds:
  - id: timer-doctor
    main: ./cmd/timer-doctor
    binary: timer-doctor
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: timer-doctor
    repository:
      owner: HeytalePazguato
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/HeytalePazguato/timer-doctor
    description: "Audit your systemd timers"
    license: MIT
    test: |
      system "#{bin}/timer-doctor", "--version"
    skip_upload: auto

scoops:
  - name: timer-doctor
    repository:
      owner: HeytalePazguato
      name: scoop-bucket
      token: "{{ .Env.SCOOP_GITHUB_TOKEN }}"
    homepage: https://github.com/HeytalePazguato/timer-doctor
    description: "Audit your systemd timers"
    license: MIT
    skip_upload: auto

dockers:
  - image_templates:
      - "ghcr.io/heytalepazguato/timer-doctor:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Audit your systemd timers"
      - "--label=org.opencontainers.image.url=https://github.com/HeytalePazguato/timer-doctor"
      - "--label=org.opencontainers.image.source=https://github.com/HeytalePazguato/timer-doctor"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"

  - image_templates:
      - "ghcr.io/heytalepazguato/timer-doctor:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Audit your systemd timers"
      - "--label=org.opencontainers.image.url=https://github.com/HeytalePazguato/timer-doctor"
      - "--label=org.opencontainers.image.source=https://github.com/HeytalePazguato/timer-doctor"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/heytalepazguato/timer-doctor:{{ .Version }}"
    image_templates:
      - "ghcr.io/heytalepazguato/timer-doctor:{{ .Version }}-amd64"
      - "ghcr.io/heytalepazguato/timer-doctor:{{ .Version }}-arm64"
  - name_template: "ghcr.io/heytalepazguato/timer-doctor:latest"
    skip_push: auto
    image_templates:
      - "ghcr.io/heytalepazguato/timer-doctor:{{ .Version }}-amd64"
      - "ghcr.io/heytalepazguato/timer-doctor:{{ .Version }}-arm64"

release:
  draft: false
  prerelease: auto
